run:
  timeout: 5m

linters:
  enable:
    - govet
    - staticcheck
    - ineffassign
    - misspell
    - errcheck
    - unused
    - gofmt

linters-settings:
  gofmt:
    simplify: true

issues:
  exclude-rules:
    # errcheck is noisy in tests — failures are surfaced by the test itself
    - path: "_test\\.go"
      linters:
        - errcheck
